<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>BiClock 设置</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <h1>BiClock 设置</h1>

    <div class="preview" id="preview">
        <div class="preview-clock" id="previewClock">00:00:00</div>
    </div>

    <fieldset>
        <legend>外观</legend>

        <div class="grid-2">
            <label class="field">
                <span class="field-label">字体大小</span>
                <span class="input-unit">
                    <input type="number" id="fontSize" min="8" max="120" step="1">
                    <span class="unit">px</span>
                </span>
            </label>

            <label class="field">
                <span class="field-label">顶部偏移</span>
                <span class="input-unit">
                    <input type="number" id="topOffset" min="0" max="200" step="1">
                    <span class="unit">px</span>
                </span>
            </label>

            <label class="field">
                <span class="field-label">文字颜色</span>
                <input type="color" id="color">
            </label>

            <label class="field">
                <span class="field-label">背景颜色</span>
                <input type="color" id="backgroundColor">
            </label>
        </div>

        <label class="row-stacked">
            <span class="row-head">
                透明度
                <span class="unit value-display" id="bgOpacityValue">100%</span>
            </span>
            <input type="range" id="bgOpacity" min="0" max="100" step="1">
        </label>

        <label class="row-check">
            <input type="checkbox" id="bold">
            <span>粗体</span>
        </label>
    </fieldset>

    <fieldset>
        <legend>显示模式</legend>

        <label class="row-radio">
            <input type="radio" name="displayMode" id="modeHover" checked>
            <span class="radio-text">
                <span class="radio-title">鼠标触发</span>
                <span class="radio-desc">仅在播放控件可见时显示</span>
            </span>
        </label>

        <label class="row-radio">
            <input type="radio" name="displayMode" id="modeAlways">
            <span class="radio-text">
                <span class="radio-title">常驻显示</span>
                <span class="radio-desc">进入全屏后一直显示</span>
            </span>
        </label>

        <p class="hint">两种模式都只在浏览器全屏（F11）下生效。常驻模式下时钟不会随控制条自动隐藏。</p>
    </fieldset>

    <fieldset>
        <legend>位置</legend>

        <div class="position-panel" id="positionPanel">
            <div class="position-marker" id="positionMarker">⏰</div>
        </div>

        <button type="button" id="resetPosition" class="reset-btn">重置为居中</button>
    </fieldset>

    <fieldset>
        <legend>时间格式</legend>

        <div class="check-row-2">
            <label class="row-check">
                <input type="checkbox" id="use24Hour">
                <span>24 小时制</span>
            </label>

            <label class="row-check">
                <input type="checkbox" id="showSeconds">
                <span>显示秒</span>
            </label>
        </div>
    </fieldset>

    <script src="popup.js"></script>
</body>
</html>
