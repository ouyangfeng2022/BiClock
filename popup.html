<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>BiClock 设置</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <h1>BiClock 设置</h1>

    <div class="preview" id="preview">
        <div class="preview-clock" id="previewClock">00:00:00</div>
    </div>

    <fieldset class="theme-fieldset">
        <legend>主题</legend>
        <div class="theme-grid" id="themeGrid" role="group" aria-label="时钟主题"></div>
        <p class="theme-hint" id="themeHint">选择主题会保留你的位置与显示设置。</p>
    </fieldset>

    <fieldset>
        <legend>外观</legend>

        <div class="grid-2">
            <label class="field field-number">
                <span class="field-label">字体大小</span>
                <span class="input-unit">
                    <input type="number" id="fontSize" min="8" max="120" step="1">
                    <span class="unit">px</span>
                </span>
            </label>

            <div class="field field-toggle">
                <span class="field-label">粗体</span>
                <span class="toggle">
                    <input type="checkbox" id="bold">
                    <span class="toggle-track" aria-hidden="true">
                        <span class="toggle-thumb"></span>
                    </span>
                </span>
            </div>
        </div>

        <div class="field field-color">
            <span class="field-label">文字颜色</span>
            <div class="color-row">
                <div class="swatches" id="colorSwatches" role="group" aria-label="文字颜色色块"></div>
                <input type="text" id="colorHex" class="hex-input"
                       maxlength="7" spellcheck="false" placeholder="#ffffff"
                       aria-label="文字颜色 Hex 值" aria-invalid="false">
            </div>
        </div>

        <div class="field field-color">
            <span class="field-label">背景颜色</span>
            <div class="color-row">
                <div class="swatches" id="bgColorSwatches" role="group" aria-label="背景颜色色块"></div>
                <input type="text" id="bgColorHex" class="hex-input"
                       maxlength="7" spellcheck="false" placeholder="#fb7299"
                       aria-label="背景颜色 Hex 值" aria-invalid="false">
            </div>
        </div>

        <label class="row-stacked">
            <span class="row-head">
                透明度
                <span class="unit value-display" id="bgOpacityValue">100%</span>
            </span>
            <input type="range" id="bgOpacity" class="opacity-range" min="0" max="100" step="1">
        </label>

        <button type="button" id="resetAppearance" class="reset-btn">重置为默认</button>
    </fieldset>

    <fieldset>
        <legend class="legend-tip">
            显示
            <span class="help-tip" tabindex="0" role="button" aria-label="显示设置说明">
                <span class="help-icon" aria-hidden="true">?</span>
                <span class="help-bubble">
                    <b>仅全屏显示</b>：开 = 只在浏览器全屏（F11）下显示（默认，避免被 B 站/浏览器原生视频工具栏遮挡）；关 = 普通播放、宽屏、网页全屏也都显示。<br>
                    <b>常驻显示</b>：关 = 控件可见时才显示（鼠标触发）；开 = 在上方选定的范围内一直显示，不随控制条自动隐藏。
                </span>
            </span>
        </legend>

        <div class="toggle-line">
            <span class="toggle-line-text">仅全屏显示</span>
            <span class="toggle">
                <input type="checkbox" id="fullscreenOnly">
                <span class="toggle-track" aria-hidden="true">
                    <span class="toggle-thumb"></span>
                </span>
            </span>
        </div>

        <div class="toggle-line">
            <span class="toggle-line-text">常驻显示</span>
            <span class="toggle">
                <input type="checkbox" id="modeAlways">
                <span class="toggle-track" aria-hidden="true">
                    <span class="toggle-thumb"></span>
                </span>
            </span>
        </div>
    </fieldset>

    <fieldset>
        <legend>位置</legend>

        <div class="position-panel" id="positionPanel">
            <div class="position-marker" id="positionMarker">⏰</div>
        </div>

        <button type="button" id="resetPosition" class="reset-btn">重置为居中</button>
    </fieldset>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
